        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [passwordError, setPasswordError] = useState('');
            
            const [currentSlide, setCurrentSlide] = useState(0);
            const [checklist, setChecklist] = useState({});
            const [isSidebarOpen, setIsSidebarOpen] = useState(false); 
            const [isDesktopSidebarOpen, setIsDesktopSidebarOpen] = useState(true); 
            const [viewMode, setViewMode] = useState('presentation'); 

            // 動態計算簡報資料中所有的核取方塊總數量
            const totalCheckboxes = useMemo(() => {
                let count = 0;
                slidesData.forEach(slide => {
                    if (slide.type === 'step' && slide.steps) {
                        count += slide.steps.length;
                    } else if (slide.type === 'two-column') {
                        if (slide.col1Steps) count += slide.col1Steps.length;
                        if (slide.col2Steps) count += slide.col2Steps.length;
                    }
                });
                return count;
            }, []);

            // 鍵盤翻頁事件監聽器：已徹底拿掉 Enter (e.key === 'Enter') 的所有翻頁邏輯
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (viewMode !== 'presentation') return;
                    if (e.key === 'ArrowRight' || e.key === ' ') {
                        e.preventDefault();
                        nextSlide();
                    } else if (e.key === 'ArrowLeft' || e.key === 'Backspace') {
                        e.preventDefault();
                        prevSlide();
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [currentSlide, viewMode]);

            const nextSlide = () => {
                if (currentSlide < slidesData.length - 1) {
                    setCurrentSlide(currentSlide + 1);
                }
            };

            const prevSlide = () => {
                if (currentSlide > 0) {
                    setCurrentSlide(currentSlide - 1);
                }
            };

            const toggleCheck = (slideId, index) => {
                setChecklist(prev => ({
                    ...prev,
                    [`${slideId}-${index}`]: !prev[`${slideId}-${index}`]
                }));
            };

            const clearAllCheckmarks = () => {
                if (window.confirm('確定要取消所有已勾選的流程項目嗎？')) {
                    setChecklist({});
                }
            };

            const handlePasswordVerify = async (e) => {
                if (e) e.stopPropagation(); // 增加防護，防止點選或按鍵冒泡
                const inputHash = await sha256(passwordInput.trim());
                if (inputHash === CORRECT_HASH) {
                    setIsAuthenticated(true);
                } else {
                    setPasswordError("密碼錯誤，請重新輸入！");
                    setPasswordInput("");
                }
            };

            const handlePasswordKeyDown = (e) => {
                if (e.key === 'Enter') {
                    e.stopPropagation(); // 多重保險：阻斷 Enter 訊號向上傳遞給簡報系統
                    handlePasswordVerify(e);
                }
            };

            if (!isAuthenticated) {
                return (
                    <div class="fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-[#2a2a2a] p-4">
                        <div class="w-full max-w-md bg-[#404040] border border-[#4f4f4f] rounded-2xl p-6 shadow-2xl text-center">
                            <h2 class="text-xl font-bold text-brandYellow mb-2">早班演算前 SOP</h2>
                            <p class="text-xs text-brandText/70 mb-6">本頁面受密碼保護，請輸入內部通行碼</p>
                            
                            <input 
                                type="password" 
                                placeholder="請輸入密碼" 
                                value={passwordInput}
                                onChange={(e) => setPasswordInput(e.target.value)}

                                                {currentData.alert && (
                                                    <div class="p-2 sm:p-2.5 rounded-xl bg-brandAlertBg border border-brandAlert/30 flex items-start gap-2 fluid-p">
                                                        <svg class="w-4 h-4 text-brandAlert mt-0.5 flex-shrink-0 animate-pulse" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" /></svg>
                                                        <div class="min-w-0 flex-1">
                                                            <h4 class="text-[9px] sm:text-[10px] font-black text-brandAlert uppercase tracking-wider">{currentData.alert.title}</h4>
                                                            <p class="text-[9px] sm:text-[10px] text-[#ffd4dc] mt-0.5 leading-relaxed font-medium">{currentData.alert.content}</p>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {currentData.type === 'precautions' && (
                                            <div class="grid grid-cols-1 lg:grid-cols-12 gap-3 py-1 overflow-hidden fluid-gap">
                                                <div class="lg:col-span-7 space-y-1.5 lg:space-y-2 flex flex-col justify-center">
                                                    {currentData.rules.map((rule, idx) => (
                                                        <div key={idx} class="p-2.5 rounded-xl bg-[#333333]/50 border-l-4 border-brandTeal space-y-0.5 fluid-p">
                                                            <h3 class="text-xs font-black text-brandYellow">{rule.title}</h3>
                                                            <p class="text-[10px] sm:text-[11px] leading-relaxed text-brandText/90">{rule.desc}</p>
                                                        </div>
                                                    ))}
                                                </div>

                                                <div class="lg:col-span-5 flex flex-col justify-center">
                                                    <div class="p-3 lg:p-4 rounded-2xl bg-brandTeal/5 border border-brandTeal/20 space-y-1 relative overflow-hidden h-full flex flex-col justify-center fluid-p">
                                                        <h3 class="text-xs font-black text-brandTeal flex items-center gap-1.5">
                                                            <span class="flex h-2 w-2 relative">
                                                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-brandTeal opacity-75"></span>
                                                                <span class="relative inline-flex rounded-full h-2 w-2 bg-brandTeal"></span>
                                                            </span>
                                                            {currentData.closing.title}
                                                        </h3>
                                                        <p class="text-[10px] sm:text-[11px] leading-relaxed text-brandText/90 whitespace-pre-line">
                                                            {currentData.closing.text}
                                                        </p>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    <div class="flex items-center justify-center relative border-t border-[#555555] pt-2 mt-2 lg:mt-4 flex-shrink-0 fluid-space w-full">
                                        <div class="absolute left-0 hidden md:block text-[9px] text-brandText/50 font-medium">
                                            控制說明：可按鍵盤 <kbd class="px-1 py-0.5 bg-[#333333] border border-[#4f4f4f] rounded text-[8px] text-brandTeal font-mono">←</kbd> <kbd class="px-1 py-0.5 bg-[#333333] border border-[#4f4f4f] rounded text-[8px] text-brandTeal font-mono">→</kbd> 或 <kbd class="px-1 py-0.5 bg-[#333333] border border-[#4f4f4f] rounded text-[8px] text-brandTeal font-mono">空白鍵</kbd>
                                        </div>
                                        <div class="flex gap-2 justify-center items-center">
                                            <button 
                                                onClick={() => setCurrentSlide(2)}
                                                class="bg-[#333333] border border-[#4f4f4f] hover:border-brandTeal hover:text-white text-brandText px-3 py-1 text-xs font-bold rounded-lg transition-all flex items-center gap-1"
                                                title="回到第3張：工作流程總覽"
                                            >
                                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                                                </svg>
                                                工作流程總覽
                                            </button>
                                            <button 
                                                onClick={prevSlide}
                                                disabled={currentSlide === 0}
                                                class={`px-3 py-1 text-xs font-bold rounded-lg transition-all flex items-center gap-1 ${
                                                    currentSlide === 0 
                                                        ? 'opacity-25 cursor-not-allowed bg-transparent text-brandText border border-[#4f4f4f]' 
                                                        : 'bg-[#333333] border border-[#4f4f4f] hover:border-brandTeal hover:text-white text-brandText'
                                                }`}
                                            >
                                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                                                上一頁
                                            </button>
                                            <button 
                                                onClick={nextSlide}
                                                disabled={currentSlide === slidesData.length - 1}
                                                class={`px-3 py-1 text-xs font-bold rounded-lg transition-all flex items-center gap-1 ${
                                                    currentSlide === slidesData.length - 1 
                                                        ? 'opacity-25 cursor-not-allowed bg-transparent text-brandText border border-[#4f4f4f]' 
                                                        : 'bg-brandTeal text-brandBg hover:bg-brandTeal/90 font-bold'
                                                }`}
                                            >
                                                下一頁
                                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                                            </button>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        ) : (
                            /* 長文手冊模式 */
                            <div class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-12 space-y-8 sm:space-y-12">
                                <div class="max-w-4xl mx-auto space-y-8 sm:space-y-12">
                                    {slidesData.map((slide, idx) => (
                                        <div 
                                            key={slide.id} 
                                            id={slide.id}
                                            class={`p-5 sm:p-8 bg-[#404040] rounded-2xl border ${currentSlide === idx ? 'border-brandTeal shadow-xl shadow-black/10' : 'border-[#4f4f4f]'} transition-all`}
                                        >
                                            <div class="flex items-center gap-3 border-b border-[#4f4f4f] pb-3 mb-5">
                                                <span class="font-mono text-[10px] px-2 py-0.5 rounded bg-[#333333] text-brandTeal font-bold">
                                                    SECTION {String(idx + 1).padStart(2, '0')}
                                                </span>
                                                <h2 class="text-base sm:text-lg font-bold text-brandYellow">{slide.title}</h2>
                                            </div>

                                            {slide.type === 'cover' && (
                                                <div class="space-y-3">
                                                    <p class="text-sm font-bold text-white">{slide.subtitle}</p>
                                                    <p class="text-xs sm:text-sm leading-relaxed text-brandText/80">{slide.content}</p>
                                                </div>
                                            )}

                                            {slide.type === 'divider' && (
                                                <div class="py-2">
                                                    <p class="text-xs sm:text-sm text-brandText/60 uppercase tracking-widest font-mono">{slide.subtitle}</p>
                                                </div>
                                            )}

                                            {slide.type === 'overview' && (
                                                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                                                    {slide.steps.map((s, sIdx) => (
                                                        <div key={sIdx} class="p-3 rounded-lg bg-[#333333]/40 border border-[#4f4f4f]/50">
                                                            <span class="text-[10px] text-brandTeal font-mono font-bold block">{s.num} {s.action}</span>
                                                            <h4 class="text-xs sm:text-sm font-bold text-white mt-0.5">{s.title}</h4>
                                                            <p class="text-[11px] text-brandText/60 mt-0.5">{s.desc}</p>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}

                                            {slide.type === 'step' && (
                                                <div class="space-y-5">
                                                    <ul class="space-y-2">
                                                        {slide.steps.map((step, sIdx) => (
                                                            <li key={sIdx} class="flex items-start gap-3 text-xs sm:text-sm">
                                                                <span class="inline-flex h-5 w-5 rounded-full bg-[#333333] border border-[#4f4f4f] text-[9px] font-mono text-brandTeal font-bold items-center justify-center mt-0.5 flex-shrink-0">
                                                                    {sIdx + 1}
                                                                </span>
                                                                <span class="flex-1 leading-relaxed text-brandText" dangerouslySetInnerHTML={{ __html: step }}></span>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                    {slide.alert && (
                                                        <div class="p-3.5 rounded-xl bg-brandAlertBg border border-brandAlert/20 text-xs">
                                                            <span class="font-bold text-brandAlert block mb-1">⚠️ {slide.alert.title}</span>
                                                            <p class="text-[#ffd4dc] leading-relaxed font-medium">{slide.alert.content}</p>
                                                        </div>
                                                    )}
                                                </div>
                                            )}

                                            {slide.type === 'two-column' && (
                                                <div class="space-y-5">
                                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                                                        <div class="space-y-3 bg-[#333333]/30 p-3.5 rounded-xl">
                                                            <h4 class="text-xs sm:text-sm font-bold text-brandTeal border-b border-[#4f4f4f] pb-1 uppercase tracking-wider">{slide.col1Title}</h4>
                                                            <ul class="space-y-1.5">
                                                                {slide.col1Steps.map((step, sIdx) => (
                                                                    <li key={sIdx} class="text-xs leading-relaxed text-brandText list-disc list-inside" dangerouslySetInnerHTML={{ __html: step }}></li>
                                                                ))}
                                                            </ul>
                                                        </div>
                                                        <div class="space-y-3 bg-[#333333]/30 p-3.5 rounded-xl">
                                                            <h4 class="text-xs sm:text-sm font-bold text-brandYellow border-b border-[#4f4f4f] pb-1 uppercase tracking-wider">{slide.col2Title}</h4>
                                                            <ul class="space-y-1.5">
                                                                {slide.col2Steps.map((step, sIdx) => (
                                                                    <li key={sIdx} class="text-xs leading-relaxed text-brandText list-disc list-inside" dangerouslySetInnerHTML={{ __html: step }}></li>
                                                                ))}
                                                            </ul>
                                                        </div>
                                                    </div>
                                                    {slide.alert && (
                                                        <div class="p-3.5 rounded-xl bg-brandAlertBg border border-brandAlert/20 text-xs">
                                                            <span class="font-bold text-brandAlert block mb-1">⚠️ {slide.alert.title}</span>
                                                            <p class="text-[#ffd4dc] leading-relaxed font-medium">{slide.alert.content}</p>
                                                        </div>
                                                    )}
                                                </div>
                                            )}

                                            {slide.type === 'precautions' && (
                                                <div class="space-y-5">
                                                    <div class="space-y-3">
                                                        {slide.rules.map((rule, rIdx) => (
                                                            <div key={rIdx} class="p-3.5 rounded-xl bg-[#333333]/50 border-l-4 border-brandTeal">
                                                                <h4 class="text-xs sm:text-sm font-bold text-brandYellow mb-0.5">{rule.title}</h4>
                                                                <p class="text-[11px] sm:text-xs leading-relaxed text-brandText/80 whitespace-pre-line">{rule.desc}</p>
                                                            </div>
                                                        ))}
                                                    </div>
                                                    <div class="p-4 rounded-xl bg-brandTeal/5 border border-brandTeal/20">
                                                        <h4 class="text-xs sm:text-sm font-bold text-brandTeal mb-1">{slide.closing.title}</h4>
                                                        <p class="text-[11px] sm:text-[12px] leading-relaxed text-brandText/80 whitespace-pre-line">{slide.closing.text}</p>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
